<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FinSight | Multilingual</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ... (Keep all previous styles) ... */
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0e1a;--card:#111827;--border:#1e2d45;--accent:#00d4aa;--accent2:#00b894;--text:#e8edf5;--muted:#6b7fa3;--danger:#ff6b6b;--warn:#ffd166;}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
.page{display:none;min-height:100vh;}
.page.active{display:block;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.lcard{width:100%;max-width:400px;background:#111827;border:1px solid var(--border);border-radius:18px;padding:36px;}
.llogo{font-size:1.5rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:4px;}
.lsub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:28px;}
.lfield{margin-bottom:14px;}
.lfield label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;}
.lfield input{width:100%;padding:11px 13px;background:#0a0e1a;border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.lfield input:focus{border-color:var(--accent);}
.lbtn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:9px;color:#0a0e1a;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;transition:background .2s;}
.lbtn:hover{background:var(--accent2);}
.step-wrap{background:var(--bg);padding:28px 24px;}
.step-header{text-align:center;margin-bottom:28px;}
.step-header h2{font-size:1.3rem;font-weight:700;color:var(--text);}
.stepper{display:flex;align-items:center;justify-content:center;margin-bottom:32px;}
.s-step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.s-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);background:var(--card);}
.s-circle.active{border-color:var(--accent);color:var(--accent);}
.s-circle.done{background:var(--accent);border-color:var(--accent);color:#0a0e1a;}
.s-label{font-size:10px;color:var(--muted);white-space:nowrap;}
.s-line{width:40px;height:2px;background:var(--border);margin-bottom:14px;}
.s-line.done{background:var(--accent);}
.form-card{background:#111827;border:1px solid var(--border);border-radius:14px;padding:24px;max-width:560px;margin:0 auto;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.ffield label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;}
.ffield input{width:100%;padding:10px 12px;background:#0a0e1a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.ffield input:focus{border-color:var(--accent);}
.form-actions{display:flex;justify-content:space-between;align-items:center;margin-top:20px;}
.btn-next{padding:10px 24px;background:var(--accent);border:none;border-radius:8px;color:#0a0e1a;font-size:13px;font-weight:700;cursor:pointer;}
.btn-back{padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;}
.loan-entry{background:#0a0e1a;border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;position:relative;}
.remove-btn{position:absolute;top:15px;right:15px;background:rgba(255,107,107,0.1);border:none;border-radius:6px;color:var(--danger);font-size:11px;cursor:pointer;padding:4px 10px;}
.add-loan-btn{width:100%;padding:11px;background:rgba(0,212,170,0.08);border:1px dashed rgba(0,212,170,0.3);border-radius:10px;color:var(--accent);cursor:pointer;font-weight:600;margin-top:6px;}
nav{display:flex;align-items:center;justify-content:space-between;padding:13px 28px;border-bottom:1px solid var(--border);background:#0a0e1a;position:sticky;top:0;z-index:100;}
.nav-logo{font-weight:800;font-size:1.2rem;color:var(--accent);}
.profile-container { display: flex; align-items: center; gap: 15px; position: relative; }
.lang-select { background: #0a0e1a; color: var(--accent); border: 1px solid var(--border); padding: 5px; border-radius: 6px; font-size: 11px; outline: none; cursor: pointer; }
.av-btn { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #0a0e1a; cursor: pointer; border: none; box-shadow: 0 0 15px rgba(0,212,170,0.15); }
.dropdown-menu { position: absolute; right: 0; top: 48px; background: #111827; border: 1px solid var(--border); border-radius: 12px; width: 160px; padding: 6px; display: none; flex-direction: column; z-index: 110; }
.dropdown-menu.show { display: flex; }
.dropdown-item { padding: 10px 12px; font-size: 12px; color: var(--text); border-radius: 8px; cursor: pointer; transition: 0.2s; }
.dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
.dash-body{padding:22px 24px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.sc{background:#111827;border:1px solid var(--border);border-radius:12px;padding:16px;}
.sc-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.sc-val{font-size:1.4rem;font-weight:700;}
.up{color:var(--accent);} .dn{color:var(--danger);} .wn{color:var(--warn);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.glass{background:#111827;border:1px solid var(--border);border-radius:14px;padding:18px;}
.sec-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.sec-title .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.chart-container{position:relative;height:240px;}
.chart-center-text{position:absolute; top:55%; left:50%; transform:translate(-50%, -50%); text-align:center;}
.chart-center-text .val{font-size:18px; font-weight:800; color:var(--text);}
.chart-center-text .lbl{font-size:9px; color:var(--muted); text-transform:uppercase;}
#chat-box{height:140px; overflow-y:auto; margin-bottom:10px; display:flex; flex-direction:column; gap:8px;}
.suggest-btn{background:rgba(0, 212, 170, 0.1); border:1px solid var(--border); color:var(--accent); padding:5px 12px; border-radius:6px; font-size:10px; cursor:pointer; margin-right:6px; margin-bottom:6px;}
#pdfSummaryResult ul { padding-left: 15px; margin-top: 10px; list-style: circle; }
#pdfSummaryResult li { margin-bottom: 8px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div id="app">
    <div id="pg-login" class="page active">
        <div class="login-wrap">
            <div class="lcard">
                <div class="llogo">FinSight</div>
                <p class="lsub">AI Financial Clarity</p>
                <div class="lfield"><label>Full Name</label><input id="l-name" type="text" placeholder="Arjun Rao"></div>
                <div class="lfield"><label>Email</label><input id="l-email" type="email" placeholder="you@example.com"></div>
                <div class="lfield"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"></div>
                <button class="lbtn" onclick="doLogin()">Get Started →</button>
            </div>
        </div>
    </div>

    <div id="pg-setup" class="page">
        <div class="step-wrap">
            <div class="step-header"><h2>Setup Finances</h2></div>
            <div class="stepper">
                <div class="s-step"><div class="s-circle active" id="sc1">1</div><span class="s-label">Income</span></div>
                <div class="s-line" id="sl1"></div>
                <div class="s-step"><div class="s-circle" id="sc2">2</div><span class="s-label">Loans</span></div>
                <div class="s-line" id="sl2"></div>
                <div class="s-step"><div class="s-circle" id="sc3">3</div><span class="s-label">Expenses</span></div>
            </div>
            <div id="step1" class="form-card">
                <div class="form-row">
                    <div class="ffield"><label>Monthly Income (₹)</label><input id="f-income" type="number" value="80000"></div>
                    <div class="ffield"><label>Other Income (₹)</label><input id="f-other" type="number" value="0"></div>
                </div>
                <div class="form-actions"><button class="btn-next" onclick="goStep(2)">Loans →</button></div>
            </div>
            <div id="step2" class="form-card" style="display:none;">
                <div id="loans-container"></div>
                <button class="add-loan-btn" onclick="addLoan()">+ Add Loan Info</button>
                <div class="form-actions"><button class="btn-back" onclick="goStep(1)">← Back</button><button class="btn-next" onclick="goStep(3)">Expenses →</button></div>
            </div>
            <div id="step3" class="form-card" style="display:none;">
                <div class="form-row">
                    <div class="ffield"><label>Rent (₹)</label><input id="f-rent" type="number" value="15000"></div>
                    <div class="ffield"><label>Food (₹)</label><input id="f-food" type="number" value="10000"></div>
                </div>
                <div class="form-actions"><button class="btn-back" onclick="goStep(2)">← Back</button><button class="btn-next" onclick="buildDashboard()">Launch ✦</button></div>
            </div>
        </div>
    </div>

    <div id="pg-dash" class="page">
        <nav>
            <div class="nav-logo">Fin<span>Sight</span></div>
            <div class="profile-container">
                <select class="lang-select" id="lang-pref" onchange="updateLanguage()">
                    <option value="English">English</option>
                    <option value="Hindi">हिंदी</option>
                    <option value="Marathi">मराठी</option>
                </select>
                <button class="av-btn" id="d-av" onclick="toggleDropdown(event)">UR</button>
                <div class="dropdown-menu" id="nav-dropdown">
                    <div class="dropdown-item" onclick="goStep(1)">Edit Data</div>
                    <div class="dropdown-item logout" onclick="location.reload()">Logout</div>
                </div>
            </div>
        </nav>

        <div class="dash-body">
            <div class="glass" style="margin-bottom:20px;">
                <div class="sec-title"><span class="dot"></span><span class="tr-ai">FinSight AI Assistant</span></div>
                <div id="chat-box"></div>
                <div style="display:flex; gap:8px; margin-top:5px;">
                    <input id="chat-input" placeholder="Ask AI..." style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--border); background:#0a0e1a; color:white; outline:none;">
                    <button onclick="sendMessage()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:10px; cursor:pointer; font-weight:800; color:#0a0e1a;">Ask</button>
                </div>
            </div>

            <div class="g4">
                <div class="sc"><div class="sc-lbl tr-inc">Income</div><div class="sc-val up" id="d-income">₹0</div></div>
                <div class="sc"><div class="sc-lbl tr-exp">Expenses</div><div class="sc-val dn" id="d-exp">₹0</div></div>
                <div class="sc"><div class="sc-lbl tr-sav">Net Savings</div><div class="sc-val" id="d-sav" style="color:#0070f3;">₹0</div></div>
                <div class="sc"><div class="sc-lbl tr-emi">Total EMI</div><div class="sc-val wn" id="d-emi">₹0</div></div>
            </div>

            <div class="g2">
                <div class="glass">
                    <div class="sec-title"><span class="dot"></span><span class="tr-dist">Wealth Distribution</span></div>
                    <div class="chart-container">
                        <canvas id="cDonut"></canvas>
                        <div class="chart-center-text"><span class="val" id="chart-sum">0%</span><br><span class="lbl tr-sav-rate">Savings</span></div>
                    </div>
                </div>
                <div class="glass">
                    <div class="sec-title"><span class="dot"></span><span class="tr-pdf">Instant PDF Summarizer</span></div>
                    <input type="file" id="pdfFile" accept=".pdf" style="font-size: 11px; margin-bottom: 12px; display: block; width: 100%;">
                    <button class="lbtn" onclick="summarizePDF()" style="padding: 8px; font-size: 12px;">Summarize</button>
                    <div id="pdfSummaryResult" style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;"></div>
                </div>
            </div>

            <div class="glass" style="margin-top: 20px;">
                <div class="sec-title"><span class="dot"></span><span class="tr-ins">Quick AI Insights</span></div>
                <div id="d-insights" style="font-size:12px; color:var(--muted); line-height: 1.6;">AI is ready.</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
var userData={name:''}, chartDonut=null, loanCount=0;

// Language Dictionary
const translations = {
    English: { inc: "Income", exp: "Expenses", sav: "Net Savings", emi: "Total EMI", dist: "Wealth Distribution", pdf: "Instant PDF Summarizer", ins: "Quick AI Insights", ai: "FinSight AI Assistant", rate: "Savings" },
    Hindi: { inc: "आय", exp: "खर्च", sav: "शुद्ध बचत", emi: "कुल ईएमआई", dist: "धन वितरण", pdf: "पीडीएफ सारांश", ins: "त्वरित एआई अंतर्दृष्टि", ai: "FinSight एआई सहायक", rate: "बचत" },
    Marathi: { inc: "उत्पन्न", exp: "खर्च", sav: "निव्वळ बचत", emi: "एकूण ईएमआई", dist: "संपत्ती वितरण", pdf: "पीडीएफ सारांश", ins: "त्वरित एआई अंतर्दृष्टी", ai: "FinSight एआई सहाय्यक", rate: "बचत" }
};

function updateLanguage() {
    const lang = document.getElementById('lang-pref').value;
    const t = translations[lang];
    document.querySelector('.tr-inc').textContent = t.inc;
    document.querySelector('.tr-exp').textContent = t.exp;
    document.querySelector('.tr-sav').textContent = t.sav;
    document.querySelector('.tr-emi').textContent = t.emi;
    document.querySelector('.tr-dist').textContent = t.dist;
    document.querySelector('.tr-pdf').textContent = t.pdf;
    document.querySelector('.tr-ins').textContent = t.ins;
    document.querySelector('.tr-ai').textContent = t.ai;
    document.querySelector('.tr-sav-rate').textContent = t.rate;
    // Re-trigger insights in the new language
    buildDashboard();
}

function toggleDropdown(e) { e.stopPropagation(); document.getElementById('nav-dropdown').classList.toggle('show'); }
window.onclick = () => document.getElementById('nav-dropdown').classList.remove('show');
function show(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function doLogin(){ var n=document.getElementById('l-name').value; if(document.getElementById('l-email').value.includes('@')){ userData.name = n || "User"; show('pg-setup'); goStep(1); } }
function goStep(s){ show('pg-setup'); [1,2,3].forEach(i=>document.getElementById('step'+i).style.display=i===s?'block':'none'); if(s===2 && loanCount===0) addLoan(); }
function addLoan(){
  loanCount++;
  var d=document.createElement('div');
  d.className='loan-entry';
  d.innerHTML=`<div style="font-size:10px; color:var(--muted); margin-bottom:10px; font-weight:700;">LOAN #${loanCount}</div>
    <button class="remove-btn" onclick="this.parentElement.remove()">Remove</button>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="ffield"><label>Loan Name</label><input type="text" class="l-name" placeholder="Home Loan"></div>
      <div class="ffield"><label>Principal (₹)</label><input type="number" class="l-p" placeholder="500000"></div>
      <div class="ffield"><label>Interest (%)</label><input type="number" class="l-r" placeholder="8.5"></div>
      <div class="ffield"><label>Months</label><input type="number" class="l-t" placeholder="120"></div>
    </div>`;
  document.getElementById('loans-container').appendChild(d);
}
function calcEMI(p,r,n){if(!r) return p/n; var mr=r/12/100; return(p*mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1);}
function fmt(n){return'₹'+Math.round(n).toLocaleString('en-IN');}

function buildDashboard(){
  var inc = parseFloat(document.getElementById('f-income').value)||0, totalInc = inc + (parseFloat(document.getElementById('f-other').value)||0);
  var exp = (parseFloat(document.getElementById('f-rent').value)||0) + (parseFloat(document.getElementById('f-food').value)||0);
  var emi = 0; document.querySelectorAll('.loan-entry').forEach(el=>{ emi += calcEMI(parseFloat(el.querySelector('.l-p').value)||0, parseFloat(el.querySelector('.l-r').value)||0, parseFloat(el.querySelector('.l-t').value)||1); });
  var sav = totalInc - exp - emi, savPct = totalInc > 0 ? Math.round((sav/totalInc)*100) : 0;
  document.getElementById('d-av').textContent = userData.name.substring(0,2).toUpperCase();
  document.getElementById('d-income').textContent = fmt(totalInc);
  document.getElementById('d-exp').textContent = fmt(exp);
  document.getElementById('d-emi').textContent = fmt(emi);
  document.getElementById('d-sav').textContent = fmt(sav);
  document.getElementById('chart-sum').textContent = savPct + "%";
  if(chartDonut) chartDonut.destroy();
  chartDonut = new Chart(document.getElementById('cDonut'), { type:'doughnut', data:{ datasets:[{data:[Math.max(0,sav), exp, emi], backgroundColor:['#00d4aa','#ff6b6b','#ffd166'], borderWeight:0}] }, options:{maintainAspectRatio:false, cutout:'85%', plugins:{legend:{display:false}}} });
  show('pg-dash');
  getAIInsights(totalInc, exp, emi, sav);
}

async function getAIInsights(inc, exp, emi, sav) {
  const lang = document.getElementById('lang-pref').value;
  const box = document.getElementById('d-insights');
  box.innerHTML = lang === "Hindi" ? "प्रोफ़ाइल का विश्लेषण..." : lang === "Marathi" ? "प्रोफाइलचे विश्लेषण..." : "Analyzing profile...";
  try {
    const res = await fetch("http://127.0.0.1:5000/ask-ai", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: "Summarize my financial health.", income: inc, expenses: exp, emi: emi, savings: sav, lang: lang})
    });
    const data = await res.json(); box.innerHTML = data.reply;
  } catch(e) { box.innerHTML = "Error."; }
}

async function sendMessage(){
  const lang = document.getElementById('lang-pref').value;
  const input = document.getElementById("chat-input"), box = document.getElementById("chat-box"), msg = input.value.trim();
  if(!msg) return;
  box.innerHTML += `<div style="text-align:right;"><span style="background:var(--accent); color:#000; padding:6px 12px; border-radius:10px; font-size:11px; font-weight:600; display:inline-block;">${msg}</span></div>`;
  input.value = "";
  box.innerHTML += `<div id="ai-load" style="font-size:10px; color:var(--muted); font-style:italic;">...</div>`;
  box.scrollTop = box.scrollHeight;
  try {
    const res = await fetch("http://127.0.0.1:5000/ask-ai", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({message: msg, lang: lang, income: document.getElementById('d-income').innerText, expenses: document.getElementById('d-exp').innerText, emi: document.getElementById('d-emi').innerText, savings: document.getElementById('d-sav').innerText})
    });
    const data = await res.json(); document.getElementById("ai-load").remove();
    box.innerHTML += `<div style="text-align:left;"><span style="background:var(--border); padding:8px 12px; border-radius:10px; font-size:11px; display:inline-block; line-height:1.4;">${data.reply}</span></div>`;
  } catch(e) { if(document.getElementById("ai-load")) document.getElementById("ai-load").remove(); }
  box.scrollTop = box.scrollHeight;
}

// PDF Scan
async function summarizePDF() {
  const file = document.getElementById("pdfFile").files[0];
  if (!file) return alert("PDF?");
  const resBox = document.getElementById("pdfSummaryResult");
  resBox.innerHTML = "Scanning...";
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = "";
    for (let i = 1; i <= Math.min(3, pdf.numPages); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(" ") + "\n";
    }
    const sentences = text.split(/[.?!]\s+/).slice(0, 4);
    let html = "<ul>";
    sentences.forEach(s => { html += `<li>${s}</li>`; });
    resBox.innerHTML = html + "</ul>";
  } catch(e) { resBox.innerHTML = "Error."; }
}
</script>
</body>
</html>
